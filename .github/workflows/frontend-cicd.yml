name: Frontend Production Deployment (Self-Hosted)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy-frontend:
    runs-on: self-hosted

    steps:
      - name: Checkout code từ GitHub
        uses: actions/checkout@v4

      - name: Ghi đè tự động file docker-compose.yml tối giản cho FE
        run: |
          echo 'version: "3.8"
          services:
            frontend:
              build:
                context: .
                dockerfile: Dockerfile
              container_name: classroom-frontend-app
              restart: always
              ports:
                - "5173:80"' > docker-compose.yml

      - name:
        run: |
          docker compose up -d --build frontend