server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 15M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $user_backend user-service-app; 
        
        proxy_pass http://$user_backend:8081; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # BỔ SUNG: Chuyển tiếp chính xác giao thức và cổng gốc cho Spring Security
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization; 
    }

    location /class-api/ {
        set $class_backend class-service-app;
        rewrite ^/class-api/(.*)$ /api/$1 break;
        
        proxy_pass http://$class_backend:8082;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization; 
    }

    location /assignment-api/ {
        set $assignment_backend assignment-service-app;
        rewrite ^/assignment-api/(.*)$ /api/$1 break; 
        
        proxy_pass http://$assignment_backend:8083;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Authorization $http_authorization; 
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}