version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: classroom-frontend-app
    restart: always
    ports:
      - "5173:80"
    stdin_open: true
    tty: true
    networks:
      - classroom-network

networks:
  classroom-network:
    external: true
    name: classroom-network
